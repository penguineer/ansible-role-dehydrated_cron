---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: debian
    image: geerlingguy/docker-debian12-ansible:latest
    command: "/lib/systemd/systemd"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /var/tmp/.ansible/tmp
  playbooks:
    prepare: prepare.yml
verifier:
  name: ansible
